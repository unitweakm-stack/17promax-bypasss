name: Build Anti-Ban Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v3 dan v4 ga o'zgartirildi

      - name: Install Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=/Users/runner/theos" >> $GITHUB_ENV
          echo "/Users/runner/theos/bin" >> $GITHUB_PATH

      - name: Setup iOS SDK (Manual Fix)
        run: |
          mkdir -p /Users/runner/theos/sdks
          # SDK-ni to'g'ridan-to'g'ri yuklab olish
          curl -L https://github.com/theos/sdks/archive/master.tar.gz | tar -xz -C /Users/runner/theos/sdks --strip-components=1

      - name: Build Tweak
        run: |
          export THEOS=/Users/runner/theos
          make package FINALPACKAGE=1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4 # MUHIM: v3 o'rniga v4 ishlatilishi shart
        with:
          name: AntiBan-Dylib
          path: packages/*.dylib
