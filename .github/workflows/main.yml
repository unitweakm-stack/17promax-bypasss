name: Build Anti-Ban Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          # Theos-ni o'rnatish
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          # Atrof-muhit o'zgaruvchilarini sozlash
          echo "THEOS=/Users/runner/theos" >> $GITHUB_ENV
          echo "/Users/runner/theos/bin" >> $GITHUB_PATH

      - name: Setup iOS SDK (Manual Fix)
        run: |
          # SDK xatosini (exit code 8) tuzatish uchun SDK-ni qo'lda yuklab olamiz
          mkdir -p /Users/runner/theos/sdks
          curl -L https://github.com/theos/sdks/archive/master.tar.gz | tar -xz -C /Users/runner/theos/sdks --strip-components=1
          # Yuklangan SDK-larni tekshirish (logda ko'rish uchun)
          ls -l /Users/runner/theos/sdks

      - name: Build Tweak
        run: |
          export THEOS=/Users/runner/theos
          # Loyihani build qilish (Final versiya)
          make package FINALPACKAGE=1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AntiBan-Dylib
          path: packages/*.dylib
