name: Build_Bypass
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
      - name: Build
        run: |
          export THEOS=~/theos
          make package
      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: MeningBypassim
          path: packages/*.deb
